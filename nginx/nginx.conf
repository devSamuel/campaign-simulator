worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Use Docker's internal DNS so upstream is resolved at request time,
        # not at nginx startup (avoids "host not found" when api isn't ready yet).
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:8000;

        # Standard proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass $api_upstream;
            proxy_read_timeout 60s;
        }

        # SSE-specific: disable buffering for the stream endpoint
        location ~ ^/api/v1/campaigns/[^/]+/simulate/[^/]+/stream$ {
            proxy_pass $api_upstream;

            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      3600s;
            proxy_connect_timeout   10s;

            proxy_set_header Connection '';
            chunked_transfer_encoding on;

            add_header X-Accel-Buffering no;
            add_header Cache-Control     no-cache;
        }
    }
}
